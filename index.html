<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pronostici Sportivi</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>🏆 Pronostici Sportivi</h1>
<p>Classifica automatica degli scommettitori</p>

</header>

<div class="container">

<div class="cards">

<div class="card">
<h3>👥 Scommettitori</h3>
<p id="totGiocatori">0</p>
</div>

<div class="card">
<h3>⚽ Eventi</h3>
<p id="totEventi">0</p>
</div>

<div class="card">
<h3>✅ Conclusi</h3>
<p id="conclusi">0</p>
</div>

<div class="card">
<h3>⏳ In attesa</h3>
<p id="attesa">0</p>
</div>

</div>

<h2>🏆 Classifica</h2>

<table id="tabellaClassifica">

<thead>

<tr>

<th>#</th>
<th>Nome</th>
<th>Punti</th>
<th>Corretti</th>
<th>Errati</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

<h2>📋 Pronostici</h2>

<input
type="text"
id="ricerca"
placeholder="🔍 Cerca evento...">

<div class="tabella">

<table id="tabellaPronostici">

</table>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
